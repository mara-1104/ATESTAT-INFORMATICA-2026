{% extends "base.html" %}

{% block content %}

<h2>Toate activitățile</h2>

<div class="activities-container">
    {% for a in activitati %}
        <div class="activity-card">
            
            {% if a.imagine %}
                <img src="{{ a.imagine.url }}">
            {% endif %}

            <h3>{{ a.titlu }}</h3>
            <p>{{ a.data }}</p>

            <a href="/activitati/{{ a.id }}">Detalii</a>
        </div>
    {% endfor %}
</div>

{% endblock %}
